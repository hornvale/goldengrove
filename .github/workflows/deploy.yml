name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - run: npm ci
      # Fetch the catalog binary BEFORE the tests: the contract tests
      # (catalogFixture, climate equivalence) drive the real vendored
      # public/hornvale_world.wasm, which is gitignored and absent until
      # this step places it.
      - run: npm run wasm:release
      - run: npm test
      - run: npm run smoke
      - run: npm run build -- --base=/orrery/
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-pages-artifact@v5
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
